  // =====================================================================

    if (!body) return;
    const isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open');
      if (icon) icon.style.transform = 'rotate(0deg)';
    } else {
      body.classList.add('open');
      if (icon) icon.style.transform = 'rotate(180deg)';
    }
  };
